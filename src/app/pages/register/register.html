<div class="register-container">
  <h2>Register</h2>

  <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
    
    <!-- Email -->
    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control"
        required
        email
        [(ngModel)]="model.email"
        #emailRef="ngModel"
      />
      <div class="error" *ngIf="emailRef.invalid && emailRef.touched">
        Please enter a valid email.
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-control"
        required
        minlength="6"
        [(ngModel)]="model.password"
        #passwordRef="ngModel"
      />
      <div class="error" *ngIf="passwordRef.invalid && passwordRef.touched">
        Password must be at least 6 characters.
      </div>
    </div>

    <!-- Confirm Password -->
    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        class="form-control"
        required
        [(ngModel)]="model.confirmPassword"
        #confirmPasswordRef="ngModel"
      />
      <div class="error" *ngIf="model.confirmPassword !== model.password && confirmPasswordRef.touched">
        Passwords do not match.
      </div>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn btn-primary" [disabled]="registerForm.invalid">
      Register
    </button>
  </form>
</div>
