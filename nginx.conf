server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    location = /app {
        return 301 /app/;
    }

    location /app/ {
        alias /usr/share/nginx/html/app/;
        try_files $uri $uri/ /app/index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
